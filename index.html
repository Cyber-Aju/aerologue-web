<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Redmine Log Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a3d3c 0%, #2a9d8f 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px 0;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 0;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            background: linear-gradient(45deg, #ffffff, #f0f8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .current-date {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            margin-top: 12px;
        }

        #currentDateDisplay {
            font-weight: 600;
            background: rgba(0, 0, 0, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .total-hours {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            font-weight: 400;
            margin-top: 10px;
            display: flex;
            /* NEW */
            justify-content: center;
            /* NEW */
            align-items: center;
            /* NEW */
            gap: 5px;
            /* NEW */
        }

        #totalHoursDisplay,
        #loggedHoursDisplay {
            font-weight: 600;
            background: rgba(0, 0, 0, 0.15);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 1.1rem;
            display: inline-block;
            min-width: 60px;
            margin: 0 5px;
        }

        #loggedHoursDisplay {
            background: rgba(72, 187, 120, 0.2);
            color: #c6f6d5;
        }

        /* NEW: Styles for the details button and modal */
        #showDetailsBtn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #showDetailsBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 2.5% auto;
            padding: 30px;
            border: 1px solid #888;
            width: 80%;
            max-width: 700px;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
        }

        .modal-close {
            color: #aaa;
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-close:hover,
        .modal-close:focus {
            color: black;
        }

        #loggedEntriesList {
            list-style: none;
            padding: 0;
            max-height: 50vh;
            overflow-y: auto;
        }

        #loggedEntriesList li {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        #loggedEntriesList li:last-child {
            border-bottom: none;
        }

        #loggedEntriesList .entry-meta {
            font-size: 0.9rem;
            color: #555;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #loggedEntriesList .entry-comment {
            font-size: 1rem;
            color: #333;
        }

        /* END NEW STYLES */

        .date-filter {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .date-filter button,
        .date-filter input[type="date"] {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 10px 9.5%;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .date-filter button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .date-filter input[type="date"] {
            padding: 8px 15px;
            -webkit-appearance: none;
            appearance: none;
        }

        .date-filter input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .date-filter input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        .main-container {
            display: flex;
            gap: 30px;
            max-width: 90vw;
            margin: 0 auto;
            align-items: flex-start;
        }

        #tabContentContainer {
            flex-grow: 1;
            min-width: 0;
        }

        .tab-navigation {
            display: flex;
            flex-direction: column;
            width: 320px;
            flex-shrink: 0;
            /* background: rgb(19, 47, 46) */
            background: linear-gradient(135deg, #0a3d3c 0%, rgb(19, 47, 46) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            /* border: 1px solid rgba(255, 255, 255, 0.2); */
            max-height: 120vh;
            margin: 50px 0px 0px 0px;
        }

        /* NEW: This container will now handle the scrolling */
        .tab-list-scroller {
            overflow-y: auto;
            flex-grow: 1;
            min-height: 0;
            /* Prevents flexbox overflow issues */
        }

        .tab-list-scroller::-webkit-scrollbar {
            display: none;
        }

        /* NEW STYLE FOR THE TASK COUNTER */
        .task-counter {
            padding: 15px 20px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .tab-button {
            flex: 0 0 auto;
            padding: 20px 25px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            text-align: left;
            width: 100%;
        }

        .tab-navigation>.tab-button:last-child {
            border-bottom: none;
        }

        .tab-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .tab-button:hover::before {
            left: 100%;
        }

        .tab-button:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-button.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-weight: 600;
            border-bottom-color: transparent;
            border-left: 4px solid #48bb78;
        }

        .tab-button.saved {
            background: rgba(72, 187, 120, 0.2);
            color: #c6f6d5;
            border-left-color: #68d391;
        }

        .tab-button.saved .tab-title::after {
            content: ' ✔️';
            font-size: 0.9em;
        }

        .tab-button.active::after {
            content: none;
        }

        .tab-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tab-subtitle {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .tab-content {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            /* MODIFIED: Prepare for saved state border */
            min-height: auto;
            transition: border-color 0.3s ease;
            /* NEW */
        }

        /* NEW: Style for saved tab content border */
        .tab-content.is-saved {
            border-color: forestgreen;
            background: #aaffcd;
        }

        .tab-content.active {
            display: block;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-form {
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 30px;
            position: relative;
            overflow: visible;
            /* <--- CHANGED to visible */
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            z-index: 1;
            /* Ensure stacking context */
        }

        .task-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00134c, #1baca5, #48bb78);
            background-size: 200% 100%;
            animation: gradient-shift 3s ease-in-out infinite;
        }

        @keyframes gradient-shift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* text-align: center; */
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px solid #e2e8f0;
        }

        .tab-subtitle.time-range {
            margin-top: 5px;
            font-weight: normal;
            opacity: 0.9;
            font-size: 0.75rem;
        }

        .task-time-range {
            font-size: 1rem;
            font-weight: 500;
            color: #4a5568;
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 20px;
        }

        .task-number {
            background: linear-gradient(135deg, #00134c, #1baca5);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .form-group {
            position: relative;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            font-size: 0.95rem;
            position: relative;
        }

        .form-group label::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00134c, #1baca5);
            transition: width 0.3s ease;
        }

        .form-group:focus-within label::after {
            width: 100%;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fff;
            position: relative;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #00134c;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .notes-field {
            background: linear-gradient(145deg, #fef9e7, #fffbeb);
            border-color: #f6d55c;
            min-height: 150px;
        }

        .notes-field:focus {
            border-color: #f6d55c;
            box-shadow: 0 0 0 4px rgba(246, 213, 92, 0.1);
        }

        .redmine-select {
            background: linear-gradient(145deg, #f0f8ff, #e6f3ff);
            border-color: #00134c;
            position: relative;
        }

        .redmine-select:focus {
            border-color: #00134c;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .redmine-select option {
            padding: 10px;
            background: #fff;
        }

        .redmine-select option:checked {
            background: linear-gradient(135deg, #00134c, #1baca5);
            color: white;
        }

        .manual-toggle-btn {
            background: none;
            border: none;
            color: #00134c;
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .manual-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .manual-input-container input {
            flex-grow: 1;
        }

        .task-navigation-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            /* padding-top: 25px; */
            border-top: 1px solid #e2e8f0;
        }

        .nav-btn {
            background: none;
            border: 2px solid #00134c;
            color: #00134c;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: #00134c;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #e2e8f0;
            border-color: #e2e8f0;
            color: #718096;
        }

        .save-btn {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            width: 73%;
            position: relative;
            overflow: hidden;
            /* margin-top: 25px; */
        }

        .save-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .save-btn:hover::before {
            left: 100%;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(72, 187, 120, 0.3);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .save-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .save-btn.is-saved {
            background: linear-gradient(135deg, #68d391, #48bb78);
            box-shadow: none;
        }

        .save-btn.is-saved:hover::before {
            content: none;
        }


        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
            color: #718096;
            flex-direction: column;
            gap: 20px;
            font-size: 1.1rem;
        }

        #tabsLoading {
            color: white;
            opacity: 0.8;
        }

        .loading::before {
            content: '';
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #00134c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        #tabsLoading::before {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #fff;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #errorPopup {
            display: none;
            background: linear-gradient(135deg, #fed7d7, #feb2b2);
            border: 2px solid #e53e3e;
            padding: 15px 40px 15px 20px;
            /* Space for close button */
            border-radius: 12px;
            color: #742a2a;
            font-weight: 600;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            box-shadow: 0 8px 25px rgba(229, 62, 62, 0.3);
            min-width: 300px;
            text-align: center;
        }

        .error-close {
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
            background: #e53e3e;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .error-close:hover {
            transform: scale(1.1);
        }

        .success-feedback {
            background: linear-gradient(135deg, #c6f6d5, #9ae6b4);
            border: 2px solid #48bb78;
            color: #22543d;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
            animation: slideInDown 0.3s ease;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1200px) {
            .main-container {
                flex-direction: column;
                max-width: 95vw;
                gap: 20px;
            }

            .tab-navigation {
                width: 100%;
                flex-direction: column;
                max-height: none;
                border-radius: 20px 20px 0 0;
            }

            .tab-button {
                min-width: 180px;
                border-bottom: none;
                border-right: 1px solid rgba(255, 255, 255, 0.1);
            }

            .tab-button.active {
                border-left: none;
                border-bottom: 4px solid #48bb78;
            }

            .tab-content {
                border-radius: 0 0 20px 20px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 0 15px;
            }

            .tab-content {
                padding: 25px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .tab-button {
                min-width: 150px;
                padding: 15px 20px;
                font-size: 0.9rem;
            }

            .header h1 {
                font-size: 2rem;
            }

            .task-form {
                padding: 25px;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
            opacity: 0.8;
            width: 100%;
        }

        .empty-state::before {
            content: '📝';
            font-size: 3rem;
            display: block;
            margin-bottom: 20px;
        }

        #showReportBtn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 1rem;
            /* Adjust size of emoji */
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: 10px;
            vertical-align: middle;
        }

        #showReportBtn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        /* NEW: Styles for the larger report modal */
        .report-modal-content {
            width: 90%;
            max-width: 1200px;
            margin: 5% auto;
        }

        #reportModalBody {
            margin-top: 20px;
            max-height: 75vh;
            overflow-y: auto;
        }

        .date-filter button#regenerateBtn {
            background: rgba(229, 62, 62, 0.1);
            /* Red-ish background */
            border-color: rgba(255, 100, 100, 0.3);
            color: #feb2b2;
            padding: 10px 15px;
            /* Tweak padding */
        }

        .date-filter button#regenerateBtn:hover {
            background: rgba(229, 62, 62, 0.3);
            color: #fff;
        }

        .date-filter button#regenerateBtn:disabled {
            background: rgba(100, 100, 100, 0.2);
            color: #aaa;
            cursor: not-allowed;
        }

        .date-filter button#monthlyReportBtn {
            background: rgba(100, 116, 234, 0.2);
            /* Indigo-ish background */
            border-color: rgba(129, 140, 248, 0.4);
            color: #c7d2fe;
            padding: 10px 15px;
        }

        .date-filter button#monthlyReportBtn:hover {
            background: rgba(100, 116, 234, 0.4);
            color: #fff;
        }

        /* --- REPLACE/ADD THESE STYLES --- */

        /* Wrapper for the custom select */
        .custom-select-wrapper {
            position: relative;
            width: 100%;
            user-select: none;
            z-index: 10;
        }

        .custom-select-wrapper.open {
            z-index: 1000;
        }

        /* The box you click to open the menu */
        .custom-select-trigger {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            font-size: 0.95rem;
            font-weight: 400;
            color: #333;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .custom-select-trigger:after {
            content: '▼';
            font-size: 0.7rem;
            color: #00134c;
            transition: transform 0.3s;
        }

        .custom-select-wrapper.open .custom-select-trigger:after {
            transform: rotate(180deg);
        }

        .custom-select-wrapper.open .custom-select-trigger {
            border-color: #00134c;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        /* The dropdown list container */
        .custom-options {
            position: absolute;
            display: block;
            top: 100%;
            left: 0;
            right: 0;
            border: 2px solid #00134c;
            border-top: 0;
            border-radius: 0 0 10px 10px;
            background: #ffffff;
            /* Ensure solid white background */
            transition: all 0.2s;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 1001;
            /* Make this very high */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            max-height: 250px;
            /* Limit height */
            overflow-y: auto;
            /* Enable scrolling inside the dropdown */
        }

        .custom-select-wrapper.open .custom-options {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;

        function parseTimeToMinutes(timeString) {
            if (!timeString || typeof timeString !== 'string') return 0;
            let totalMinutes = 0;
            const hoursMatch = timeString.match(/(\d+(\.\d+)?)\s*h/i);
            const minutesMatch = timeString.match(/(\d+)\s*m/i);
            const numberOnlyMatch = timeString.match(/^(\d+(\.\d+)?)$/);

            if (hoursMatch) {
                totalMinutes += parseFloat(hoursMatch[1]) * 60;
            }
            if (minutesMatch) {
                totalMinutes += parseInt(minutesMatch[1], 10);
            }
            if (!hoursMatch && !minutesMatch && numberOnlyMatch) {
                totalMinutes += parseFloat(numberOnlyMatch[1]) * 60;
            }
            return totalMinutes;
        }

        function formatMinutesToHours(totalMinutes) {
            if (totalMinutes === 0) return '0h';
            const hours = Math.floor(totalMinutes / 60);
            const mins = Math.round(totalMinutes % 60);
            let formattedTime = '';
            if (hours > 0) {
                formattedTime += `${hours}h`;
            }
            if (mins > 0) {
                formattedTime += ` ${mins}m`;
            }
            return formattedTime.trim();
        }

        // NEW: Standardizes time input to an hourly format string (e.g., "2.5h")
        function standardizeTimeInput(timeString) {
            const totalMinutes = parseTimeToMinutes(timeString);
            if (totalMinutes === 0) return '0h';
            const hours = totalMinutes / 60;
            return `${hours.toFixed(2)}h`;
        }

        function fetchIssues(isRetry = false, retryBtnId = null) {
            const apiKey = document.getElementById('remoteApiKey').value.trim();
            if (!apiKey) return;

            const btn = retryBtnId ? document.getElementById(retryBtnId) : null;
            if (btn) btn.classList.add('spinning');

            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        showError("Failed to fetch issues: " + data.error);
                    } else {
                        let combined = [];
                        // Process Assigned Issues
                        (data.assigned || []).forEach(issue => {
                            issue.group = 'Assigned';
                            issue.displayStatus = `Assigned - ${issue.status.name}`;
                            combined.push(issue);
                        });
                        // Process Project Issues
                        (data.project || []).forEach(issue => {
                            issue.group = 'Project';
                            issue.displayStatus = `Project - ${issue.status.name}`;
                            combined.push(issue);
                        });

                        redmineIssues = combined;
                        updateDropdownsAfterFetch();
                    }
                    if (btn) setTimeout(() => btn.classList.remove('spinning'), 500);
                })
                .catch(error => {
                    console.error('Error loading Redmine issues:', error);
                    showError('Failed to load Redmine issues');
                    if (btn) btn.classList.remove('spinning');
                });
        }

        // 4. Setup Event Listeners for the Custom Dropdown
        function setupCustomDropdown(index) {
            const wrapper = document.getElementById(`custom_dropdown_${index}`);
            const trigger = document.getElementById(`trigger_${index}`);
            const searchInput = document.getElementById(`search_input_${index}`);
            const statusFilter = document.getElementById(`status_filter_${index}`);

            // Populate Status Filter
            const uniqueStatuses = [...new Set(redmineIssues.map(i => i.displayStatus))].sort();
            statusFilter.innerHTML = '<option value="">All</option>';
            uniqueStatuses.forEach(status => {
                const option = document.createElement('option');
                option.value = status;
                option.textContent = status;
                statusFilter.appendChild(option);
            });

            populateCustomOptions(index);

            // Toggle Dropdown
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.custom-select-wrapper').forEach(el => {
                    if (el !== wrapper) el.classList.remove('open');
                });
                wrapper.classList.toggle('open');
                if (wrapper.classList.contains('open')) {
                    searchInput.value = '';
                    populateCustomOptions(index);
                    searchInput.focus();
                }
            });

            searchInput.addEventListener('input', () => populateCustomOptions(index));
            statusFilter.addEventListener('change', () => populateCustomOptions(index));
            searchInput.addEventListener('click', (e) => e.stopPropagation());
            statusFilter.addEventListener('click', (e) => e.stopPropagation());
        }

        function navigateTasks(direction) {
            if (currentlyActiveIndex === -1 || tasks.length <= 1) return;

            let newIndex = currentlyActiveIndex;
            if (direction === 'next') {
                newIndex = (currentlyActiveIndex + 1) % tasks.length;
            } else if (direction === 'prev') {
                newIndex = (currentlyActiveIndex - 1 + tasks.length) % tasks.length;
            }
            activateTab(newIndex);
        }


        function activateTab(index) {
            if (index < 0 || index >= tasks.length) return;
            currentlyActiveIndex = index;

            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            const tabButton = document.querySelector(`[data-tab-index="${index}"]`);
            const tabContent = document.getElementById(`task-tab-${index}`);

            if (tabButton && tabContent) {
                tabButton.classList.add('active');
                tabButton.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                tabContent.classList.add('active');
            }

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.disabled = (tasks.length <= 1);
            });
        }

        function fixGrammar(index) {
            const textarea = document.getElementById(`desc_${index}`);
            const btn = document.getElementById(`grammar_btn_${index}`);
            const resetBtn = document.getElementById(`reset_btn_${index}`);
            const currentText = textarea.value;

            if (!currentText.trim()) {
                alert("Please enter some text to check first.");
                return;
            }

            // Save state
            originalDescriptions[index] = currentText;

            // UI Loading State
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = '⏳ Checking...';
            btn.disabled = true;
            resetBtn.style.display = 'none';
            textarea.style.opacity = '0.7';

            const payload = {
                action: 'fix_grammar',
                text: currentText
            };

            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                // Using text/plain prevents strict CORS preflight blocking on GitHub Pages
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.corrected_text) {
                        textarea.value = data.corrected_text;
                        textarea.classList.add('flash-success');
                        setTimeout(() => textarea.classList.remove('flash-success'), 1000);
                        resetBtn.style.display = 'inline-block';
                    } else if (data.error) {
                        console.error(data.error);
                        alert("Error checking grammar: " + data.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("Network error.");
                })
                .finally(() => {
                    btn.innerHTML = originalBtnText;
                    btn.disabled = false;
                    textarea.style.opacity = '1';
                });
        }

            if (originalDescriptions[index] !== undefined) {
                // Restore the old text

                // Hide the reset button since we are back to original
                resetBtn.style.display = 'none';

                // Optional: Visual cue that it was reset
                textarea.style.backgroundColor = "#fff0f0"; // Flash red/pink briefly
                setTimeout(() => textarea.style.backgroundColor = "", 300);
            }

        // MODIFIED: Added time standardization and saved state for tab content
        function saveTask(event, index) {
            const getValue = id => document.getElementById(id)?.value || "";
            const statusSpan = document.getElementById(`upload_status_${index}`);

            const rawTime = getValue(`time_${index}`);
            const totalMinutes = parseTimeToMinutes(rawTime);
            if (totalMinutes === 0) {
                showError('❌ Estimated time cannot be zero. Please enter a valid time.');
                return;
            }
            const standardizedTime = standardizeTimeInput(rawTime);
            const hoursDecimal = parseFloat((totalMinutes / 60).toFixed(2)); // Convert to decimal hours for Redmine

            const manualWrapper = document.getElementById(`issue_manual_wrapper_${index}`);
            const manualInput = document.getElementById(`issue_manual_${index}`);
            const selectInput = document.getElementById(`issue_select_${index}`);

            let redmineId = '';
            if (manualWrapper.style.display !== 'none') {
                redmineId = manualInput.value.trim();
            } else {
                redmineId = selectInput.value;
            }

            if (!redmineId) {
                showError('❌ Please select or manually enter a Redmine Issue ID before saving.');
                return;
            }

            const apiKey = document.getElementById('remoteApiKey').value.trim();
            if (!apiKey) {
                showError('❌ Please enter your Redmine API Key at the top of the page.');
                return;
            }

            // --- UI Setup ---
            const saveBtn = event.target;
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '⏳ Logging Time...';
            saveBtn.disabled = true;
            if (statusSpan) statusSpan.textContent = "";

            // Notes Logic
            const notesCheckbox = document.getElementById(`notes_toggle_${index}`);
            let notesToSend = "";
            if (notesCheckbox && notesCheckbox.checked) {
                const rawNotes = getValue(`notes_${index}`);
                if (rawNotes.trim() !== '') {
                    // This mimics Parsedown by converting Markdown to HTML!
                    notesToSend = marked.parse(rawNotes);
                }
            }

            // Lookup Activity ID
            const activityStr = getValue(`activity_${index}`).trim();
            const activityId = activityMap[activityStr] || 9; // Fallback to 9 if not found

            const payload = {
                action: 'save_entry',
                redmine_key: apiKey,
                redmine_id: redmineId,
                spent_date: spentDate,
                hours: hoursDecimal,
                activity_id: activityId,
                main_activity: getValue(`main_${index}`),
                comments: getValue(`desc_${index}`),
                notes: notesToSend
            };

            // Post to Google Apps Script
            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                // Using text/plain prevents strict CORS preflight blocking on GitHub Pages
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
                .then(res => res.json())
                .then(response => {
                    if (response.error) {
                        showError(`❌ Error saving task: ${response.error}`);
                        saveBtn.innerHTML = originalText;
                        saveBtn.disabled = false;
                    } else {
                        showSuccess(index, '✅ ' + response.message);

                        const tabButton = document.querySelector(`[data-tab-index="${index}"]`);
                        const tabContent = document.getElementById(`task-tab-${index}`);
                        if (tabButton) tabButton.classList.add('saved');
                        if (tabContent) tabContent.classList.add('is-saved');

                        saveBtn.innerHTML = '✔️ Saved';
                        saveBtn.classList.add('is-saved');

                        const timeInput = document.getElementById(`time_${index}`);
                        timeInput.value = standardizedTime;

                        loggedMinutes += totalMinutes;
                        updateLoggedHoursDisplay();
                    }
                })
                .catch(error => {
                    console.error('Fetch Error:', error);
                    showError('❌ Network error. Check your Apps Script URL or internet connection.');
                    saveBtn.innerHTML = originalText;
                    saveBtn.disabled = false;
                });
        }

                    reportModalBody.innerHTML = '<p style="color: red;">Failed to load the activity report. Please try again later.</p>';
                });
        }

        reportModalCloseBtn.onclick = function () {
            reportModal.style.display = "none";
        }

        // Add a new window onclick handler for the report modal
        window.addEventListener('click', function (event) {
            if (event.target == reportModal) {
                reportModal.style.display = "none";
            }
        });
        // --- END REPORT MODAL LOGIC ---

    </script>
</body>

</html>
